indexpage:
  title: Documentazione NetApp Ransomware Resilience
  summary: NetApp Ransomware Resilience protegge, rileva e supporta il ripristino
    dei carichi di lavoro dalle minacce ransomware negli ambienti on-premises e cloud
    storage. Ransomware Resilience consente backup e ripristino sicuri, aiutando le
    organizzazioni a salvaguardare i dati critici e a mantenere la continuità operativa
    per database Oracle, datastore VM, storage NAS e altro ancora.
